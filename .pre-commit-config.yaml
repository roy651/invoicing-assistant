repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key         # blocks PEM/SSH private keys
      - id: check-added-large-files    # default 500 kB limit
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Secret / credential scanning (primary guard)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  # Python lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
